name: General CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with: 
        node-version: '22'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    - name: Run unit tests
      run: npm test


  e2e-tests:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with: 
        node-version: '22'

    - name: Install dependencies
      run: npm ci --ignore-scripts

    # Playwright Setup
    - name: Get Playwright version
      id: playwright-version
      run: echo "version=$(npx playwright --version)" >> $GITHUB_OUTPUT

    - name: Setup caching for Playwright browsers
      id: cache-playwright
      uses: actions/cache@v4
      with:
        # This is where Playwright stores browsers
        path: ~/.cache/ms-playwright
        key: playwright-browsers-${{ steps.playwright-version.outputs.version }}

    - name: Install Playwright browsers
      if: steps.cache-playwright.outputs.cache-hit != 'true'
      run: npx playwright install --with-deps
  
    - name: Ensure that system-level dependencies exist
      if: steps.cache-playwright.outputs.cache-hit == 'true'
      run: npx playwright install-deps

    # Running tests and saving report
    - name: Run e2e tests
      run: npx playwright test

    - name: Upload test report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 15
