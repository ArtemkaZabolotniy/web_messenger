name: General CI Pipeline

on:
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: checkout repo
      uses: actions/checkout@v4
    - name: setup nodejs
      uses: actions/setup-node@v4
      with: 
        node-version: '22'
    - name: install deps
      run: npm ci
    - name: run tests
      run: npm test